<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>{% block title %}DişAsistanım{% endblock %}</title>
    
    <meta name="theme-color" content="#06b6d4" />
    <link rel="manifest" href="/static/manifest.json" />
    <link rel="apple-touch-icon" href="/static/img/icon-192.png">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" />
    <link rel="stylesheet" href="/static/css/style.css" />

    {% block extra_css %}{% endblock %}
</head>
<body class="d-flex flex-column min-vh-100" style="background: linear-gradient(180deg, #fff8f3 0%, #e8f7f3 45%, #f4fbff 100%); background-attachment: fixed;">

    {% include "layout/header.html" %}

    <main class="flex-grow-1">
        {% block content %}{% endblock %}
    </main>

    {% include "layout/footer.html" %}

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    
    <script>
        document.addEventListener("DOMContentLoaded", function() {
            let currentPath = window.location.pathname;
            let navLinks = document.querySelectorAll("#nav-menu .nav-link");
            
            navLinks.forEach(link => {
                if(link.getAttribute("href") === currentPath) {
                    link.style.borderBottom = "2px solid white";
                    link.style.fontWeight = "bold";
                }
            });
        });
    </script>
    {% block extra_js %}{% endblock %}
</body>
</html>
